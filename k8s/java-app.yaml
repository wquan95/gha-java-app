apiVersion: apps/v1
kind: Deployment
metadata:
  name: gha-java-app
  labels:
    app: gha-java-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gha-java-app
  template:
    metadata:
      labels:
        app: gha-java-app
    spec:
      nodeSelector:
        env: dev
        team: retail
      containers:
        - name: gha-java-app
          image: 927749346049.dkr.ecr.us-east-1.amazonaws.com/gha-java-app:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5